<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pavanraj Hearts</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at center, #2b0033, #000);
        font-family: Arial, sans-serif;
    }

    h1 {
        position: absolute;
        color: #ff4da6;
        font-size: 80px;
        letter-spacing: 5px;
        text-shadow: 0 0 20px #ff1a75, 0 0 40px #ff0066;
        animation: glow 1.5s infinite alternate;
    }

    @keyframes glow {
        from {
            text-shadow: 0 0 10px #ff1a75;
        }
        to {
            text-shadow: 0 0 30px #ff66b2, 0 0 60px #ff1a75;
        }
    }

    .heart {
        position: absolute;
        width: 20px;
        height: 20px;
        background: #ff1a75;
        transform: rotate(-45deg);
        animation: float 4s linear infinite;
    }

    .heart::before,
    .heart::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        background: #ff1a75;
        border-radius: 50%;
    }

    .heart::before {
        top: -10px;
        left: 0;
    }

    .heart::after {
        left: 10px;
        top: 0;
    }

    @keyframes float {
        from {
            transform: translateY(100vh) rotate(-45deg);
            opacity: 1;
        }
        to {
            transform: translateY(-10vh) rotate(-45deg);
            opacity: 0;
        }
    }
</style>
</head>
<body>

<h1>PAVANRAJ</h1>

<script>
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
